{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Criar Nova Conta</h3>
                
                <form method="POST" action="/registrar">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" required placeholder="Digite seu nome">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Digite seu e-mail">
                    </div>
                    
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required placeholder="Crie uma senha segura">
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 py-2">Cadastrar</button>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="mb-0">Já possui uma conta?</p>
                    <a href="/login" class="text-decoration-none">Faça login aqui</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
