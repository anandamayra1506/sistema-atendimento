{% extends "base.html" %}

{% block content %}
<div class="row mt-4 justify-content-center">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Cadastrar Novo Atendente</h3>
            <a href="/" class="btn btn-outline-secondary btn-sm">Voltar</a>
        </div>
        
        <div class="card shadow-sm border-primary">
            <div class="card-header bg-primary text-white">
                Preencha os dados do novo membro da equipe
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/admin/atendentes/novo">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome do Atendente</label>
                        <input type="text" class="form-control" id="nome" name="nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail Corporativo</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha Inicial</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Criar Conta de Atendente</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
