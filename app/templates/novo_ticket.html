{% extends "base.html" %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Abrir Nova Solicitação</h3>
            <a href="/" class="btn btn-outline-secondary btn-sm">Voltar ao Início</a>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="/ticket/novo">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Assunto / Título</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required placeholder="Ex: Problema de acesso">
                    </div>
                    
                    <div class="mb-4">
                        <label for="descricao" class="form-label">Descrição detalhada do problema</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="5" required placeholder="Descreva o que está acontecendo..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 py-2">Enviar Solicitação</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
