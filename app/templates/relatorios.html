{% extends "base.html" %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Relatórios Gerenciais</h3>
            <a href="/" class="btn btn-outline-secondary btn-sm">Voltar ao Painel</a>
        </div>
        
        <div class="row text-center">
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-warning h-100">
                    <div class="card-body py-5">
                        <h1 class="display-3 text-warning fw-bold">{{ abertos }}</h1>
                        <h5 class="text-muted">Chamados Abertos</h5>
                        <p class="small text-muted mb-0">Aguardando primeira resposta</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-primary h-100">
                    <div class="card-body py-5">
                        <h1 class="display-3 text-primary fw-bold">{{ andamento }}</h1>
                        <h5 class="text-muted">Em Andamento</h5>
                        <p class="small text-muted mb-0">Sendo tratados pela equipe</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-success h-100">
                    <div class="card-body py-5">
                        <h1 class="display-3 text-success fw-bold">{{ resolvidos }}</h1>
                        <h5 class="text-muted">Resolvidos</h5>
                        <p class="small text-muted mb-0">Problemas solucionados</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
