{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Acesso ao Sistema</h3>
                
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Digite seu e-mail">
                    </div>
                    
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required placeholder="Digite sua senha">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="mb-0">É cliente e não possui conta?</p>
                    <a href="/registrar" class="text-decoration-none">Faça seu cadastro aqui</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
